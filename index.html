<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#fdfaf5" />
    <title>Bingo Musical 🎵</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #fdfaf5;
        font-family: 'Jost', sans-serif;
        color: #3d2b1f;
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100dvh; }

      .landscape-warning { display: none; }

      @media (orientation: landscape) and (pointer: coarse) {
        .landscape-warning {
          display: flex;
          position: fixed;
          inset: 0;
          background: #fdfaf5;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 16px;
          z-index: 9999;
          font-family: 'Jost', sans-serif;
          text-align: center;
          padding: 32px;
        }
        .app-content { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
